sections:
  problem:
    label: "Research problem"
    title: "AI systems are documented, but their decision states are rarely reconstructable."
    text: "Regulated AI workflows need evidence that can be independently checked. Logs, screenshots and explanations are useful, but they do not automatically prove that a specific AI-assisted decision state can be reconstructed, replayed and verified."

  core:
    id: "core"
    label: "DigiEmu Core"
    title: "A deterministic standard for AI decision-state boundaries."
    text: "Core describes how AI-related knowledge states are captured, canonicalized and separated from non-deterministic metadata. It defines what must be reproducible, what stays outside the hash and how AI governance evidence can be structured."
    items:
      - "Canonical JSON snapshots"
      - "Inside-hash vs outside-hash boundary"
      - "SHA-256 state identity"
      - "Replay-ready decision states"
      - "EU AI Act traceability framing"

  proof:
    id: "proof"
    label: "DigiEmu Proof"
    title: "A minimal verifier for deterministic execution integrity."
    text: "Proof checks whether snapshots, receipts and transition chains compose into a verifiable result. The output is intentionally concrete: PASS or FAIL."
    items:
      - "Replay verification"
      - "Receipt continuity"
      - "Tamper detection"
      - "Negative tests for broken chains"
      - "Audit-ready evidence reports"

